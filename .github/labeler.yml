# Labeler Configuration
# Automatically labels PRs based on file changes

"platform: macos":
  - changed-files:
      - any-glob-to-any-file:
          - "client/build/icons/mac/**"
          - "client/build/entitlements.mac.plist"
          - "client/scripts/*mac*"
          - "client/scripts/notarize.js"

"platform: windows":
  - changed-files:
      - any-glob-to-any-file:
          - "client/build/icons/win/**"
          - "client/scripts/*win*"
          - "client/scripts/setup-python-runtime.js"
          - "client/scripts/nsis-installer.nsh"

"platform: linux":
  - changed-files:
      - any-glob-to-any-file:
          - "client/build/icons/png/**"
          - "client/scripts/*linux*"

"area: renderer":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/renderer/**"
          - "client/vite.config.ts"
          - "client/tailwind.config.js"
          - "client/postcss.config.js"

"area: main":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/main/**"
          - "client/src/common/**"
          - "client/electron-tsconfig.json"

"area: openclaw":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/main/libs/*openclaw*"
          - "client/scripts/*openclaw*"
          - "client/scripts/ensure-openclaw-version.cjs"
          - "client/scripts/apply-openclaw-patches.cjs"

"area: skills":
  - changed-files:
      - any-glob-to-any-file:
          - "client/SKILLs/**"
          - "client/src/main/skillManager.ts"

"area: cowork":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/main/libs/cowork*"
          - "client/src/renderer/components/cowork/**"
          - "client/src/renderer/store/slices/coworkSlice.ts"

"area: im":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/main/im/**"
          - "client/src/renderer/components/im/**"

"area: artifacts":
  - changed-files:
      - any-glob-to-any-file:
          - "client/src/renderer/components/artifacts/**"
          - "client/src/renderer/services/artifactParser.ts"

"area: build":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "client/electron-builder.json"
          - "client/scripts/build*.js"
          - "client/scripts/*build*"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "client/docs/**"
          - "**/*.md"
          - "README*"
